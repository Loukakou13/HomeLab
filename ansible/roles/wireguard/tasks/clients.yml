- name: Ensure clients key directory exists
  become: true
  ansible.builtin.file:
    path: "{{ wireguard_config_dir }}/clients"
    state: directory
    mode: '0700'

- name: Initialize clients public keys list
  ansible.builtin.set_fact:
    wireguard_clients_public_keys: []

- name: Manage each Wireguard client
  ansible.builtin.include_tasks: client_item.yml
  loop: "{{ wireguard_clients }}"
  loop_control:
    loop_var: wg_client
