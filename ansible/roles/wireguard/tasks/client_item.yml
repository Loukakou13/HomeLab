- name: Check if client private key exists
  become: true
  ansible.builtin.stat:
    path: "{{ wireguard_config_dir }}/clients/{{ wg_client.name }}.key"
  register: wireguard_client_key_stat

- name: Generate client private key
  ansible.builtin.command: wg genkey
  register: wireguard_client_private_key_cmd
  changed_when: true
  when: not wireguard_client_key_stat.stat.exists

- name: Save client private key
  become: true
  ansible.builtin.copy:
    content: "{{ wireguard_client_private_key_cmd.stdout }}"
    dest: "{{ wireguard_config_dir }}/clients/{{ wg_client.name }}.key"
    mode: '0600'
  when: not wireguard_client_key_stat.stat.exists

- name: Read client private key
  become: true
  ansible.builtin.slurp:
    src: "{{ wireguard_config_dir }}/clients/{{ wg_client.name }}.key"
  register: wireguard_client_private_key_raw

- name: Decode client private key
  ansible.builtin.set_fact:
    wireguard_client_private_key: "{{ wireguard_client_private_key_raw.content | b64decode }}"

- name: Generate client public key
  ansible.builtin.shell: "echo '{{ wireguard_client_private_key }}' | wg pubkey"
  register: wireguard_client_public_key_cmd
  changed_when: false

- name: Append client public key to list
  ansible.builtin.set_fact:
    wireguard_clients_public_keys: >-
      {{ wireguard_clients_public_keys +
         [ {
             'name': wg_client.name,
             'ip': wg_client.ip,
             'public_key': wireguard_client_public_key_cmd.stdout
           } ]
      }}

- name: Generate client configuration file
  become: true
  ansible.builtin.template:
    src: client.conf.j2
    dest: "{{ wireguard_clients_output_dir }}/{{ wg_client.name }}.conf"
    mode: '0600'
  vars:
    client_private_key: "{{ wireguard_client_private_key }}"
