- name: Init the first master node
  hosts: k3s-m-1
  become: true
  roles:
    - k3s

- name: Install other nodes
  hosts: k3s,!k3s-m-1
  serial: 1
  become: true
  roles:
    - k3s

- name: Configure Kubernetes addons
  hosts: localhost
  vars:
    kubeconfig_path: /tmp/k3s.yml
    argocd_root_app_url: https://raw.githubusercontent.com/Loukakou13/HomeLab/refs/heads/main/gitops/clusters/main/root.yml
  roles:
    - cilium
    - kube_vip
    - cert_manager
    - argocd
