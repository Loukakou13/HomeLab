apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homarr
spec:
  parentRefs:
    - name: nginx-int-pub
      namespace: gateway-system
  hostnames:
    - "homarr.loukawai.fr"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homarr
          port: 8200
