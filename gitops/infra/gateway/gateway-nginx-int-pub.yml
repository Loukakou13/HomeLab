apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: nginx-int-pub
spec:
  gatewayClassName: nginx
  infrastructure:
    annotations:
      metallb.io/loadBalancerIPs: "192.168.1.201"
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-nginx-int-pub: "true"
      tls:
        mode: Terminate
        certificateRefs:
          - name: secret-tls
