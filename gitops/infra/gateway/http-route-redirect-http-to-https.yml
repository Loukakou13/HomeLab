apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-http-to-https
spec:
  parentRefs:
    - name: nginx-ext-pub
      sectionName: http

    - name: nginx-int-pub
      sectionName: http

    - name: nginx-int-priv
      sectionName: http

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
