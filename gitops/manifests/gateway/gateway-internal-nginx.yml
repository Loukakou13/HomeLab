apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal-nginx
  namespace: gateway
spec:
  gatewayClassName: nginx
  infrastructure:
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.1.203"
  listeners:
    - name: http
      port: 80
      protocol: HTTP
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: secret-tls
