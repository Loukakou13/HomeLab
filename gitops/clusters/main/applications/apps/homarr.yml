apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homarr
  namespace: argocd
spec:
  project: apps
  sources:
    - repoURL: https://github.com/Loukakou13/HomeLab.git
      targetRevision: main
      path: gitops/apps/homarr
    - chart: homarr
      repoURL: https://homarr-labs.github.io/charts/
      targetRevision: 5.8.0
      helm:
        releaseName: homarr
        valueFiles:
          - $values/gitops/apps/homarr/values.yml
    - repoURL: https://github.com/Loukakou13/HomeLab.git
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: homarr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        gateway-nginx-int-pub: true
    syncOptions:
      - CreateNamespace=true
